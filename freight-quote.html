<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>物流价格比价</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --line: rgba(15, 23, 42, 0.08);
      --line-strong: rgba(15, 23, 42, 0.14);
      --text: #111827;
      --muted: #6b7280;
      --accent: #111827;
      --accent-soft: #facc15;
      --accent-soft-text: #1f2937;
      --ok: #166534;
      --warn: #b45309;
      --danger: #b91c1c;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0) 36%),
        radial-gradient(circle at top right, rgba(251, 191, 36, 0.18) 0%, rgba(251, 191, 36, 0) 28%),
        linear-gradient(180deg, #fbfbfd 0%, var(--bg) 50%, #eef2f7 100%);
      color: var(--text);
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .hero {
      display: grid;
      gap: 16px;
      padding: 28px 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.82));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-kicker {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      max-width: 880px;
      color: #475569;
      font-size: 16px;
      line-height: 1.7;
    }

    .banner {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
      box-shadow: var(--shadow-soft);
    }

    .banner::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.85;
    }

    .banner.warn {
      color: var(--warn);
      border-color: rgba(180, 83, 9, 0.15);
      background: rgba(255, 247, 237, 0.94);
    }

    .banner.danger {
      color: var(--danger);
      border-color: rgba(185, 28, 28, 0.15);
      background: rgba(254, 242, 242, 0.94);
    }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(320px, 360px) minmax(0, 1fr);
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

    .left-panel,
    .right-panel {
      display: grid;
      gap: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.82));
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 22px 24px 0;
    }

    .panel-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .panel-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 20px 24px 0;
    }

    .summary-card {
      padding: 18px 18px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.82);
    }

    .summary-card strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .summary-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .supplier-list {
      display: grid;
      gap: 14px;
      padding: 20px 24px 24px;
    }

    .supplier-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.84);
    }

    .supplier-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
    }

    .supplier-top h3 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .supplier-meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.live {
      color: var(--ok);
      border-color: rgba(22, 101, 52, 0.14);
      background: rgba(240, 253, 244, 0.92);
    }

    .field-row {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .field-row label {
      color: var(--muted);
      font-size: 13px;
    }

    .discount-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .number-input,
    .text-input,
    .file-input,
    .warehouse-input {
      width: 100%;
      min-height: 46px;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    }

    .warehouse-input {
      min-height: 42px;
      padding: 10px 12px;
      resize: none;
      overflow: hidden;
      line-height: 1.4;
    }

    .number-input:focus,
    .text-input:focus,
    .file-input:focus,
    .warehouse-input:focus {
      border-color: rgba(17, 24, 39, 0.3);
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.06);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
    }

    .toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .action-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .button {
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .button.secondary {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.warn {
      color: var(--warn);
    }

    .status.danger {
      color: var(--danger);
    }

    .accordion {
      overflow: hidden;
    }

    .accordion summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 26px 28px;
      cursor: pointer;
      user-select: none;
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: -0.05em;
      font-weight: 700;
    }

    .accordion summary::-webkit-details-marker {
      display: none;
    }

    .accordion summary::after {
      content: "▾";
      color: var(--accent);
      font-size: 28px;
      transition: transform 160ms ease;
    }

    .accordion[open] summary::after {
      transform: rotate(180deg);
    }

    .accordion-body {
      padding: 0 24px 24px;
      display: grid;
      gap: 18px;
    }

    .field-group {
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.8);
    }

    .field-group h3,
    .grid-header h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .option-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .pill {
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
    }

    .pill.is-active {
      border-color: rgba(161, 98, 7, 0.2);
      background: var(--accent-soft);
      color: var(--accent-soft-text);
      box-shadow: 0 10px 24px rgba(250, 204, 21, 0.22);
    }

    .grid-section {
      padding: 22px 24px 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.8);
    }

    .grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.95);
    }

    .batch-table {
      width: 100%;
      min-width: 720px;
      border-collapse: separate;
      border-spacing: 0;
    }

    .batch-table th,
    .batch-table td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      border-right: 1px solid rgba(15, 23, 42, 0.06);
      vertical-align: top;
      background: rgba(255, 255, 255, 0.96);
    }

    .batch-table th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(249, 250, 251, 0.98);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .batch-table tr:last-child td {
      border-bottom: 0;
    }

    .batch-table th:last-child,
    .batch-table td:last-child {
      border-right: 0;
    }

    .sticky-cell {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 170px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 16px 0 24px rgba(255, 255, 255, 0.96);
    }

    .batch-table th.sticky-cell {
      z-index: 4;
      background: rgba(249, 250, 251, 0.99);
    }

    .price-cell {
      min-width: 92px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .channel-cell {
      min-width: 150px;
    }

    .muted-value {
      color: var(--muted);
    }

    .empty-block {
      padding: 28px 24px;
      border: 1px dashed rgba(15, 23, 42, 0.14);
      border-radius: var(--radius-md);
      color: var(--muted);
      text-align: center;
      background: rgba(248, 250, 252, 0.7);
    }

    .comparison-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .comparison-results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .comparison-column {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.84);
      overflow: hidden;
    }

    .comparison-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
    }

    .comparison-head h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .comparison-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .comparison-list {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .comparison-item {
      padding: 16px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 18px;
      background: rgba(249, 250, 251, 0.72);
    }

    .comparison-item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .comparison-item h4 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      color: var(--muted);
      font-size: 12px;
    }

    .price-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 14px;
    }

    .price-line strong {
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: #334155;
      font-size: 12px;
    }

    @media (max-width: 1120px) {
      .app-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100vw, calc(100vw - 20px));
        padding-top: 18px;
      }

      .hero,
      .accordion summary,
      .panel-header,
      .summary-grid,
      .supplier-list,
      .accordion-body {
        padding-left: 18px;
        padding-right: 18px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .grid-section,
      .field-group {
        padding: 18px;
      }

      .grid-header,
      .comparison-controls,
      .supplier-top,
      .discount-grid {
        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="hero-kicker">Freight Quote</span>
      <h1>网页内完成各家物流商的上传、批量查询和多渠道比价。</h1>
      <p>隐藏 sheet 会被完全忽略；模板结构变化会返回分层错误；优惠金额可以单独保存，并在单仓比价和批量查询里一起生效。</p>
      <div class="banner" id="meta-banner">正在读取当前报价数据...</div>
    </section>

    <main class="app-shell">
      <section class="left-panel">
        <section class="panel">
          <header class="panel-header">
            <div>
              <h2 class="panel-title">当前版本</h2>
              <p class="panel-subtitle">左侧负责上传报价和优惠金额，右侧负责批量查询与多渠道比价。</p>
            </div>
          </header>
          <section class="summary-grid" id="summary-grid"></section>
          <section class="supplier-list" id="supplier-panel"></section>
        </section>
      </section>

      <section class="right-panel">
        <details open class="panel accordion" id="batch-query">
          <summary>批量查询</summary>
          <section class="accordion-body" id="batch-query-root"></section>
        </details>

        <details class="panel accordion" id="comparison-query">
          <summary>多渠道比价</summary>
          <section class="accordion-body" id="comparison-root"></section>
        </details>
      </section>
    </main>
  </main>

  <script type="module" src="./freight-quote-app.js"></script>
</body>
</html>
